<svg id="forge-anvil" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="Hammer forging a lightning bolt on an anvil">

  <defs>
    <!-- Bolt glow blur -->
    <filter id="bolt-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
    </filter>
    <!-- Spark glow -->
    <filter id="spark-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle anvil shadow -->
    <filter id="anvil-shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <!-- Impact flash radial -->
    <radialGradient id="impact-rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff5e0" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#ffcc66" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C8823A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Anvil ─────────────────────────────────────────────────────── -->
  <g id="anvil" filter="url(#anvil-shadow)">
    <!-- Horn (left) -->
    <path d="M 122,192 Q 68,196 58,210 Q 62,222 122,218 Z" fill="#2a2520"/>
    <!-- Horn rim highlight -->
    <path d="M 122,192 Q 68,196 58,210 Q 62,214 68,213 Q 80,208 122,205 Z"
          fill="#3a3530" opacity="0.7"/>

    <!-- Main body -->
    <path d="M 118,178 L 282,178 L 278,230 L 148,230 Z" fill="#2a2520"/>

    <!-- Waist step (narrowing) -->
    <path d="M 148,230 L 278,230 L 270,250 L 152,250 Z" fill="#252018"/>

    <!-- Base plate -->
    <path d="M 140,250 L 260,250 L 265,270 L 135,270 Z" fill="#2a2520"/>

    <!-- Top face highlight (rim) -->
    <path d="M 118,178 L 282,178 L 280,184 L 120,184 Z" fill="#3a3530"/>

    <!-- Right-side rim highlight -->
    <path d="M 282,178 L 282,184 L 278,230 L 274,230 L 278,184 Z"
          fill="#3a3530" opacity="0.5"/>

    <!-- Left-side slight highlight -->
    <path d="M 118,178 L 124,184 L 120,230 L 118,230 Z"
          fill="#302a28" opacity="0.4"/>
  </g>

  <!-- ── Lightning bolt (resting on anvil top) ────────────────────── -->
  <!-- Glow layer — wider, blurred path behind core -->
  <path id="bolt-glow"
    d="M 183,108 L 221,108 L 207,144 L 217,144 L 226,178
       L 207,178 L 198,152 L 188,152 L 195,112 Z"
    fill="#8a5520"
    filter="url(#bolt-blur)"
    opacity="0.6"/>

  <!-- Core layer -->
  <path id="bolt-core"
    d="M 183,108 L 221,108 L 207,144 L 217,144 L 226,178
       L 207,178 L 198,152 L 188,152 L 195,112 Z"
    fill="#8a5520"/>

  <!-- ── Hammer ─────────────────────────────────────────────────────── -->
  <!--
    transform-origin at haft grip = (210, 192) in SVG coords.
    CSS sets: transform-origin: 210px 192px; transform-box: view-box;
    Raise animation: rotate(-45deg); Strike animation: rotate(0deg).
  -->
  <g id="hammer">
    <!-- Haft (oak-brown handle) -->
    <rect x="206" y="128" width="9" height="64" rx="2" fill="#6b4a2a"/>
    <!-- Haft grain highlight -->
    <rect x="209" y="128" width="2" height="64" rx="1" fill="#8b6a40" opacity="0.5"/>

    <!-- Head (steel, flat-face hammer) -->
    <path d="M 181,106 L 239,106 L 239,130 L 181,130 Z" fill="#4a4540"/>

    <!-- Head — top rim light (bright edge) -->
    <path d="M 181,106 L 239,106 L 239,110 L 181,110 Z" fill="#6a6560" opacity="0.65"/>

    <!-- Head — striking face (right) rim -->
    <path d="M 239,106 L 239,130 L 235,130 L 235,106 Z" fill="#5a5a4e" opacity="0.5"/>

    <!-- Head — rear face (left) darker -->
    <path d="M 181,106 L 185,106 L 185,130 L 181,130 Z" fill="#3a3830" opacity="0.6"/>
  </g>

  <!-- ── Electric arc (CLANK phase crackle along bolt) ─────────────── -->
  <!--
    Drawn on via stroke-dasharray animation in CSS.
    stroke-dasharray + stroke-dashoffset keyframe: 0→100% draws the arc.
  -->
  <path id="electric-arc"
    d="M 204,112 L 214,122 L 200,132 L 216,142 L 202,154 L 218,164 L 208,178"
    fill="none"
    stroke="#a8d8ff"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="120"
    stroke-dashoffset="120"
    opacity="0"/>

  <!-- ── Impact flash (circle at strike point) ─────────────────────── -->
  <circle id="impact-flash"
    cx="204" cy="108"
    r="28"
    fill="url(#impact-rg)"
    opacity="0"/>

  <!-- ── Spark elements (pre-placed, radiate from strike point) ───── -->
  <!-- Strike point: (204, 112) — top of bolt / where hammer hits -->
  <!-- Sparks start at center, animate outward via CSS keyframes -->
  <circle class="spark-1"  cx="204" cy="112" r="2.5" fill="#ffcc66" opacity="0"/>
  <circle class="spark-2"  cx="204" cy="112" r="2.0" fill="#C8823A" opacity="0"/>
  <circle class="spark-3"  cx="204" cy="112" r="3.0" fill="#ffcc66" opacity="0"/>
  <circle class="spark-4"  cx="204" cy="112" r="1.8" fill="#fff5e0" opacity="0"/>
  <circle class="spark-5"  cx="204" cy="112" r="2.2" fill="#C8823A" opacity="0"/>
  <circle class="spark-6"  cx="204" cy="112" r="2.8" fill="#ffcc66" opacity="0"/>
  <circle class="spark-7"  cx="204" cy="112" r="1.5" fill="#fff5e0" opacity="0"/>
  <circle class="spark-8"  cx="204" cy="112" r="2.0" fill="#C8823A" opacity="0"/>
  <!-- Extra sparks for clank burst -->
  <circle class="spark-9"  cx="204" cy="112" r="2.5" fill="#ffcc66" opacity="0"/>
  <circle class="spark-10" cx="204" cy="112" r="1.8" fill="#fff5e0" opacity="0"/>

  <!-- ── Anvil base sparks pile (ambient glow at base) ─────────────── -->
  <circle cx="170" cy="268" r="1.5" fill="#C8823A" opacity="0.15"/>
  <circle cx="185" cy="270" r="1.0" fill="#ffcc66" opacity="0.12"/>
  <circle cx="200" cy="272" r="1.8" fill="#C8823A" opacity="0.18"/>
  <circle cx="218" cy="270" r="1.2" fill="#ffcc66" opacity="0.10"/>
  <circle cx="232" cy="268" r="1.5" fill="#C8823A" opacity="0.14"/>
</svg>
