<svg id="sprocket-hammer" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="Engineering sprocket with hammer — forging animation">

  <defs>
    <!-- Impact flash radial -->
    <radialGradient id="impact-rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff5e0" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#ffcc66" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C8823A" stop-opacity="0"/>
    </radialGradient>

    <!-- Sprocket body — forge light from above, fixed in user-space so the
         bright spot stays at top of scene as the gear rotates CCW -->
    <radialGradient id="sprocket-rg" cx="200" cy="142" r="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6e6c66"/>
      <stop offset="25%"  stop-color="#55534e"/>
      <stop offset="55%"  stop-color="#3e3c38"/>
      <stop offset="85%"  stop-color="#2e2c28"/>
      <stop offset="100%" stop-color="#1e1c18"/>
    </radialGradient>

    <!-- Forge-light angular overlay (top of gear catches more light) — also user-space -->
    <linearGradient id="forge-light-lg" x1="200" y1="115" x2="200" y2="245" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#b0aea6" stop-opacity="0.28"/>
      <stop offset="35%"  stop-color="#7a7870" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Specular ring highlight (bright inner-edge chamfer) -->
    <radialGradient id="chamfer-rg" cx="200" cy="152" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="74%"  stop-color="#a0a09a" stop-opacity="0.0"/>
      <stop offset="86%"  stop-color="#a0a09a" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#a0a09a" stop-opacity="0.0"/>
    </radialGradient>

    <!-- Hub bore inner-shadow (deep recess) -->
    <radialGradient id="hub-bore-rg" cx="200" cy="175" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0c0a08"/>
      <stop offset="55%"  stop-color="#181613"/>
      <stop offset="100%" stop-color="#282622"/>
    </radialGradient>

    <!-- Hub face (annular ring around the bore — bevel effect) -->
    <radialGradient id="hub-face-rg" cx="200" cy="174" r="23" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3a3835"/>
      <stop offset="60%"  stop-color="#484644"/>
      <stop offset="100%" stop-color="#5c5a58"/>
    </radialGradient>

    <!-- Spoke gradient (rounded cross-section illusion) -->
    <linearGradient id="spoke-lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5c5a58"/>
      <stop offset="40%"  stop-color="#484644"/>
      <stop offset="100%" stop-color="#2a2826"/>
    </linearGradient>

    <!-- Tooth tip highlight (top teeth catch forge light) — user-space -->
    <radialGradient id="tooth-tip-rg" cx="200" cy="128" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9a9890" stop-opacity="0.30"/>
      <stop offset="50%"  stop-color="#9a9890" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#9a9890" stop-opacity="0.0"/>
    </radialGradient>

    <!-- Hammer steel head — vertical gradient, bright top edge, dark body -->
    <linearGradient id="steel-head-lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c0beb8"/>
      <stop offset="12%"  stop-color="#7a7870"/>
      <stop offset="45%"  stop-color="#50504c"/>
      <stop offset="80%"  stop-color="#3c3a36"/>
      <stop offset="100%" stop-color="#545250"/>
    </linearGradient>

    <!-- Hammer steel head — horizontal gradient for side-depth -->
    <linearGradient id="steel-depth-lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.28"/>
      <stop offset="25%"  stop-color="#000000" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Hammer striking face (front face of head) -->
    <linearGradient id="strike-face-lg" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#8a8880"/>
      <stop offset="40%"  stop-color="#5c5c58"/>
      <stop offset="100%" stop-color="#3a3a36"/>
    </linearGradient>

    <!-- Wooden handle — warm oak grain with subtle taper -->
    <linearGradient id="wood-grain-lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4a2e18"/>
      <stop offset="20%"  stop-color="#7a4e2a"/>
      <stop offset="50%"  stop-color="#8c6035"/>
      <stop offset="78%"  stop-color="#7a4e2a"/>
      <stop offset="100%" stop-color="#5a3820"/>
    </linearGradient>

    <!-- Ground shadow radial -->
    <radialGradient id="shadow-rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Ambient ground shadow -->
  <ellipse cx="200" cy="264" rx="72" ry="11" fill="url(#shadow-rg)"/>

  <!-- ══ SPROCKET group — rotated CCW continuously by CSS ══ -->
  <g id="sprocket">

    <!-- ── Gear body: outer disk fill ── -->
    <!-- Step 1: main forged-steel radial gradient fill -->
    <circle cx="200" cy="180" r="65" fill="url(#sprocket-rg)"/>

    <!-- Step 2: forge-light angular overlay (brighter at top) -->
    <circle cx="200" cy="180" r="65" fill="url(#forge-light-lg)"/>

    <!-- Step 3: dark inner-hole (the web/bore cavity) -->
    <circle cx="200" cy="180" r="50" fill="#1e1c18"/>

    <!-- Step 4: inner-shadow at the edge of the bore opening (depth cue) -->
    <circle cx="200" cy="180" r="50" fill="none" stroke="#0a0a08" stroke-width="5" opacity="0.5"/>

    <!-- Step 5: chamfer / specular ring on outer face of rim -->
    <circle cx="200" cy="180" r="60" fill="none" stroke="url(#chamfer-rg)" stroke-width="5" opacity="1"/>

    <!-- Step 6: outer rim top-edge highlight line -->
    <circle cx="200" cy="180" r="65" fill="none" stroke="#787672" stroke-width="1.2" opacity="0.45"/>

    <!-- ── 16 Teeth ── jagged trapezoidal teeth that protrude beyond the rim.
         Bases sit at r=58 (just inside body r=65 so they blend smoothly into
         the rim) and tips reach out to r=76 (11 units of clear protrusion).
         Base half-angle 7°, tip half-angle 4° → each tooth tapers and the
         8.5° gap between teeth shows as a deep notch against the dark
         background, giving the gear an unmistakable jagged silhouette. -->
    <g fill="url(#sprocket-rg)">
      <path d="M194.7,104.2 L205.3,104.2 L207.1,122.4 L192.9,122.4 Z"/>
      <path d="M224.1,107.9 L233.9,112.0 L228.6,129.5 L215.5,124.1 Z"/>
      <path d="M249.9,122.6 L257.4,130.1 L245.7,144.3 L235.7,134.3 Z"/>
      <path d="M268.0,146.1 L272.1,155.9 L255.9,164.5 L250.5,151.4 Z"/>
      <path d="M275.8,174.7 L275.8,185.3 L257.6,187.1 L257.6,172.9 Z"/>
      <path d="M272.1,204.1 L268.0,213.9 L250.5,208.6 L255.9,195.5 Z"/>
      <path d="M257.4,229.9 L249.9,237.4 L235.7,225.7 L245.7,215.7 Z"/>
      <path d="M233.9,248.0 L224.1,252.1 L215.5,235.9 L228.6,230.5 Z"/>
      <path d="M205.3,255.8 L194.7,255.8 L192.9,237.6 L207.1,237.6 Z"/>
      <path d="M175.9,252.1 L166.1,248.0 L171.4,230.5 L184.5,235.9 Z"/>
      <path d="M150.1,237.4 L142.6,229.9 L154.3,215.7 L164.3,225.7 Z"/>
      <path d="M132.0,213.9 L127.9,204.1 L144.1,195.5 L149.5,208.6 Z"/>
      <path d="M124.2,185.3 L124.2,174.7 L142.4,172.9 L142.4,187.1 Z"/>
      <path d="M127.9,155.9 L132.0,146.1 L149.5,151.4 L144.1,164.5 Z"/>
      <path d="M142.6,130.1 L150.1,122.6 L164.3,134.3 L154.3,144.3 Z"/>
      <path d="M166.1,112.0 L175.9,107.9 L184.5,124.1 L171.4,129.5 Z"/>
    </g>
    <!-- Tooth tip specular overlay (top-facing teeth catch forge light) -->
    <g fill="url(#tooth-tip-rg)">
      <path d="M194.7,104.2 L205.3,104.2 L207.1,122.4 L192.9,122.4 Z"/>
      <path d="M224.1,107.9 L233.9,112.0 L228.6,129.5 L215.5,124.1 Z"/>
      <path d="M249.9,122.6 L257.4,130.1 L245.7,144.3 L235.7,134.3 Z"/>
      <path d="M166.1,112.0 L175.9,107.9 L184.5,124.1 L171.4,129.5 Z"/>
      <path d="M142.6,130.1 L150.1,122.6 L164.3,134.3 L154.3,144.3 Z"/>
    </g>
    <!-- Forge-light overlay on teeth removed: the duplicated layer muddied
         tooth edges as the gear rotates. Tooth-tip specular above is enough. -->

    <!-- ── Inner machined channel / web area ── -->
    <!-- Web fill matching the bore -->
    <circle cx="200" cy="180" r="50" fill="#22201c"/>
    <!-- Web highlight ring at inner rim edge (chamfer) -->
    <circle cx="200" cy="180" r="50" fill="none" stroke="#525050" stroke-width="1.5" opacity="0.5"/>
    <circle cx="200" cy="180" r="49" fill="none" stroke="#101010" stroke-width="1" opacity="0.6"/>

    <!-- ── Three spokes (90° / 210° / 330°) — nod to ROOT3POWER ── -->
    <rect x="220" y="177" width="30" height="6" rx="3"
          fill="url(#spoke-lg)" stroke="#20201e" stroke-width="0.6"/>
    <rect x="-14" y="-3" width="30" height="6" rx="3"
          fill="url(#spoke-lg)" stroke="#20201e" stroke-width="0.6"
          transform="translate(183,209.5) rotate(120)"/>
    <rect x="-14" y="-3" width="30" height="6" rx="3"
          fill="url(#spoke-lg)" stroke="#20201e" stroke-width="0.6"
          transform="translate(183,150.5) rotate(240)"/>

    <!-- ── Hub (central boss around bore) ── -->
    <!-- Hub face ring -->
    <circle cx="200" cy="180" r="22" fill="url(#hub-face-rg)"/>
    <!-- Hub outer bevel edge -->
    <circle cx="200" cy="180" r="22" fill="none" stroke="#6a6864" stroke-width="0.8" opacity="0.55"/>
    <!-- Hub bore inner-shadow -->
    <circle cx="200" cy="180" r="18" fill="url(#hub-bore-rg)"/>
    <!-- Hub bore rim (chamfer cue) -->
    <circle cx="200" cy="180" r="18" fill="none" stroke="#484644" stroke-width="1" opacity="0.45"/>
    <!-- Hub bore center keyway dark -->
    <circle cx="200" cy="180" r="5.5" fill="#080806"/>
    <!-- Hub bore keyway highlight (gives it a 3D machined look) -->
    <circle cx="198" cy="178" r="2.5" fill="#303030" opacity="0.6"/>

    <!-- ── 16 Tooth-glow circles (CSS-animated, opacity=0 by default) ── -->
    <!-- tooth-glow-0 = 12 o'clock = strike point at new tooth tip (200, 104.2) -->
    <circle class="tooth-glow-0"  cx="200.0" cy="104.2" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-1"  cx="229.1" cy="109.8" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-2"  cx="253.7" cy="126.3" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-3"  cx="270.2" cy="150.9" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-4"  cx="276.0" cy="180.0" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-5"  cx="270.2" cy="209.1" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-6"  cx="253.7" cy="233.7" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-7"  cx="229.1" cy="250.2" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-8"  cx="200.0" cy="256.0" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-9"  cx="170.9" cy="250.2" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-10" cx="146.3" cy="233.7" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-11" cx="129.8" cy="209.1" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-12" cx="124.0" cy="180.0" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-13" cx="129.8" cy="150.9" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-14" cx="146.3" cy="126.3" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-15" cx="170.9" cy="109.8" r="4" fill="#C8823A" opacity="0"/>

  </g><!-- end #sprocket -->

  <!-- ══ HAMMER group — pendulum swing by CSS (transform-origin: center 85%) ══ -->
  <!-- Cross-peen blacksmith hammer.
       Bounding box: x=169..235, y=84..197.  width=66, height=113.
       Horizontal midpoint = 202, ~at sprocket center x=200.
       transform-origin: center 85% → pivot at y = 84 + 0.85*113 = 180.05 ≈ sprocket center y=180 ✓
       Striking face bottom edge sits at y=114, just above strike-point tooth at (200,115). -->
  <g id="hammer">

    <!-- ── Wooden handle ── thicker, tapered (wider at head, narrow at grip) -->
    <!-- Tapered shaft: top 13px wide at y=114, narrowing to 9px wide at y=197 -->
    <polygon points="193.5,114 206.5,114 204.5,197 195.5,197"
             fill="url(#wood-grain-lg)"/>
    <!-- Centre highlight (bright grain run) -->
    <polygon points="199.3,114 200.7,114 200.4,197 199.6,197"
             fill="#c89055" opacity="0.32"/>
    <!-- Right-edge shadow (depth + silhouette separation) -->
    <polygon points="205.0,114 206.5,114 204.5,197 203.5,197"
             fill="#1e0e04" opacity="0.42"/>
    <!-- Left-edge shadow -->
    <polygon points="193.5,114 195.0,114 196.5,197 195.5,197"
             fill="#1e0e04" opacity="0.30"/>
    <!-- Two grip wrap bands (down from three for cleaner small-size read) -->
    <rect x="194.5" y="148" width="11" height="2.2" rx="1.0" fill="#2a1408" opacity="0.55"/>
    <rect x="195.0" y="170" width="10" height="2.2" rx="1.0" fill="#2a1408" opacity="0.55"/>

    <!-- ── Steel head ── cross-peen silhouette: peen wedge + eye collar + striking face -->

    <!-- Peen (left): tapered wedge narrowing to a horizontal chisel edge -->
    <polygon points="191,86 191,114 169,102 169,98"
             fill="url(#steel-head-lg)"/>

    <!-- Striking face (right): squarish block, slightly taller than wide -->
    <rect x="209" y="86" width="26" height="28" rx="2" fill="url(#steel-head-lg)"/>

    <!-- Eye collar (middle): raised band that visually clamps the handle -->
    <rect x="191" y="84" width="18" height="32" rx="2.5" fill="url(#steel-head-lg)"/>

    <!-- Striking-face polished right edge (brighter chamfer) -->
    <rect x="230" y="88" width="5" height="24" rx="1.5" fill="url(#strike-face-lg)"/>

    <!-- Peen left-tip rear shadow (depth on the back face of the wedge) -->
    <polygon points="169,98 174,99 174,101 169,102"
             fill="#000000" opacity="0.35"/>

    <!-- Single top-edge highlight that spans peen → collar → face as one forged piece -->
    <polygon points="171,99 191,87 209,85 233,87 235,89 209,88 191,89 173,100"
             fill="#e0deda" opacity="0.55"/>

    <!-- Subtle diagonal specular from upper-left (matches sprocket light source from above) -->
    <polygon points="178,100 198,89 230,89 232,93 198,93 180,103"
             fill="#d8d6d0" opacity="0.18"/>

    <!-- Lower edge bounce-light reflection (subtle) -->
    <rect x="192" y="112" width="42" height="2.5" rx="1" fill="#6a6860" opacity="0.30"/>

    <!-- Eye collar raised-band shadow lines (top + bottom outline of collar so it
         reads as a raised ring rather than blending into the rest of the head) -->
    <line x1="191" y1="86" x2="191" y2="114" stroke="#1e1c18" stroke-width="0.7" opacity="0.45"/>
    <line x1="209" y1="86" x2="209" y2="114" stroke="#1e1c18" stroke-width="0.7" opacity="0.45"/>

    <!-- Eye / handle socket indent (where the handle enters the head) -->
    <rect x="194" y="86" width="12" height="28" rx="1.5"
          fill="none" stroke="#1e1c18" stroke-width="0.8" opacity="0.40"/>
    <!-- Socket top shadow (depth into the eye cutout) -->
    <rect x="195" y="86" width="10" height="3.5" rx="1"
          fill="#000000" opacity="0.28"/>

  </g><!-- end #hammer -->

  <!-- ══ Impact flash (circle at strike point, CSS animated) ══ -->
  <!-- Centered between new top tooth tip (y≈104) and hammer face bottom (y≈115). -->
  <circle id="impact-flash"
    cx="200" cy="110"
    r="28"
    fill="url(#impact-rg)"
    opacity="0"/>

  <!-- ══ Sparks (pre-placed at strike point, fly outward via CSS) ══ -->
  <circle class="spark-1"  cx="200" cy="110" r="2.5" fill="#ffcc66" opacity="0"/>
  <circle class="spark-2"  cx="200" cy="110" r="2.0" fill="#C8823A" opacity="0"/>
  <circle class="spark-3"  cx="200" cy="110" r="3.0" fill="#ffcc66" opacity="0"/>
  <circle class="spark-4"  cx="200" cy="110" r="1.8" fill="#fff5e0" opacity="0"/>
  <circle class="spark-5"  cx="200" cy="110" r="2.2" fill="#C8823A" opacity="0"/>
  <circle class="spark-6"  cx="200" cy="110" r="2.8" fill="#ffcc66" opacity="0"/>
  <circle class="spark-7"  cx="200" cy="110" r="1.5" fill="#fff5e0" opacity="0"/>
  <circle class="spark-8"  cx="200" cy="110" r="2.0" fill="#C8823A" opacity="0"/>
  <circle class="spark-9"  cx="200" cy="110" r="2.5" fill="#ffcc66" opacity="0"/>
  <circle class="spark-10" cx="200" cy="110" r="1.8" fill="#fff5e0" opacity="0"/>

</svg>
