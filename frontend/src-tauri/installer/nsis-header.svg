<svg viewBox="0 0 150 57" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="R3P Transmittal Builder installer header">

  <defs>
    <linearGradient id="hdr-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a1210"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <linearGradient id="hdr-bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffcc66"/>
      <stop offset="100%" stop-color="#C8823A"/>
    </linearGradient>
    <filter id="hdr-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="150" height="57" fill="url(#hdr-bg)"/>

  <!-- Faint diagonal hatching -->
  <rect width="150" height="57" fill="none"
    style="background-image:repeating-linear-gradient(-45deg,rgba(200,130,58,.025) 0,rgba(200,130,58,.025) 1px,transparent 1px,transparent 8px)"/>

  <!-- Anvil silhouette (left-aligned, compact) -->
  <!-- Anvil body at x=8-38, y=18-45 -->
  <path d="M 8,22 L 38,22 L 37,34 L 22,34 L 21,40 L 36,40 L 35,46 L 12,46 L 11,40 L 9,40 L 8,34 Z"
    fill="#2a2520"/>
  <path d="M 8,22 L 38,22 L 38,25 L 8,25 Z" fill="#3a3530"/>
  <!-- Horn -->
  <path d="M 8,26 Q 2,28 2,32 Q 2,36 8,35 Z" fill="#2a2520"/>

  <!-- Bolt on anvil (small, clear silhouette) -->
  <path d="M 18,12 L 26,12 L 22,20 L 25,20 L 28,22 L 21,22 L 19,18 L 16,18 Z"
    fill="url(#hdr-bolt)" filter="url(#hdr-glow)"/>

  <!-- Separator line -->
  <line x1="48" y1="10" x2="48" y2="47" stroke="rgba(200,130,58,0.2)" stroke-width="1"/>

  <!-- R3P logo mark -->
  <rect x="55" y="12" width="20" height="20" rx="4"
    fill="none" stroke="#C8823A" stroke-width="1.2" opacity="0.8"/>
  <text x="65" y="26" text-anchor="middle" dominant-baseline="middle"
    font-family="ui-monospace, monospace" font-size="7" font-weight="700"
    fill="#C8823A">R3P</text>

  <!-- "R3P Transmittal Builder" wordmark -->
  <text x="82" y="22" dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700"
    font-variant="small-caps" letter-spacing="0.05em"
    fill="#C8823A">R3P</text>
  <text x="82" y="34" dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600"
    letter-spacing="0.12em"
    fill="rgba(156,163,175,0.85)">TRANSMITTAL BUILDER</text>
</svg>
