<svg id="icon-master" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="R3P Transmittal Builder — bolt on anvil icon">

  <defs>
    <!-- Bolt glow for larger sizes -->
    <filter id="bolt-glow-lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle anvil shadow -->
    <filter id="anvil-shadow-lg" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <!-- Anvil rim gradient -->
    <linearGradient id="anvil-rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4a4540"/>
      <stop offset="100%" stop-color="#1a1210"/>
    </linearGradient>
    <!-- Bolt gradient -->
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffcc66"/>
      <stop offset="50%"  stop-color="#C8823A"/>
      <stop offset="100%" stop-color="#a06030"/>
    </linearGradient>
    <!-- Bolt glow gradient -->
    <radialGradient id="bolt-glow-rg" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#ffcc66" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C8823A" stop-opacity="0"/>
    </radialGradient>
    <!-- Background gradient -->
    <radialGradient id="bg-rg" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#2a2018"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </radialGradient>
    <!-- Spark gradient -->
    <radialGradient id="spark-rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffcc66"/>
      <stop offset="100%" stop-color="#C8823A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark warm background -->
  <rect width="512" height="512" fill="url(#bg-rg)" rx="80"/>

  <!-- ── Anvil ─────────────────────────────────────────────────────── -->
  <g id="anvil" filter="url(#anvil-shadow-lg)">
    <!-- Horn (left) -->
    <path d="M 148,248 Q 68,256 54,278 Q 60,298 148,292 Z" fill="#2a2520"/>
    <!-- Horn rim -->
    <path d="M 148,248 Q 68,256 54,278 Q 60,268 78,264 Q 110,258 148,260 Z"
          fill="#3a3530" opacity="0.8"/>

    <!-- Main body (flat top at y=238, tapers down) -->
    <path d="M 142,238 L 370,238 L 362,302 L 180,302 Z" fill="#2a2520"/>

    <!-- Waist step -->
    <path d="M 180,302 L 362,302 L 350,334 L 190,334 Z" fill="#222018"/>

    <!-- Base plate -->
    <path d="M 168,334 L 344,334 L 352,362 L 160,362 Z" fill="#2a2520"/>

    <!-- Top face rim highlight -->
    <path d="M 142,238 L 370,238 L 368,248 L 144,248 Z" fill="#3a3530"/>

    <!-- Right-side rim light -->
    <path d="M 370,238 L 370,248 L 362,302 L 354,302 L 362,248 Z"
          fill="#3a3530" opacity="0.55"/>

    <!-- Base bottom shadow line -->
    <path d="M 160,358 L 352,358 L 352,362 L 160,362 Z" fill="#150e0a" opacity="0.5"/>
  </g>

  <!-- ── Glow behind bolt ──────────────────────────────────────────── -->
  <ellipse cx="256" cy="270" rx="70" ry="50" fill="url(#bolt-glow-rg)" opacity="0.7"/>

  <!-- ── Lightning bolt (amber, standing on anvil top) ──────────── -->
  <!-- viewBox-scaled version of the forge-anvil bolt, centered at x=256 -->
  <!-- Bolt bottom sits at y=238 (anvil top). Extends up to y=138. -->
  <path id="bolt-icon"
    d="M 224,138 L 284,138
       L 261,184 L 278,184
       L 292,238
       L 263,238 L 248,200 L 232,200
       L 244,150 Z"
    fill="url(#bolt-grad)"
    filter="url(#bolt-glow-lg)"
    opacity="0.95"/>

  <!-- Bright core highlight on bolt (left edge) -->
  <path
    d="M 230,145 L 242,155 L 236,184 L 248,184 L 258,215 L 246,238 L 263,238 L 268,225
       L 260,200 L 278,200 L 292,238 L 263,238"
    fill="none"
    stroke="#ffee99"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.4"/>

  <!-- ── Decorative sparks (48 px and larger only — cropped at small sizes) -->
  <!-- Spark cluster at upper-right of bolt -->
  <circle cx="296" cy="162" r="5"  fill="url(#spark-rg)" opacity="0.7"/>
  <circle cx="310" cy="148" r="3"  fill="#ffcc66"         opacity="0.5"/>
  <circle cx="305" cy="178" r="4"  fill="url(#spark-rg)" opacity="0.6"/>
  <circle cx="318" cy="166" r="2.5" fill="#ffcc66"        opacity="0.4"/>
  <!-- Spark cluster at upper-left -->
  <circle cx="214" cy="155" r="4"  fill="url(#spark-rg)" opacity="0.55"/>
  <circle cx="200" cy="168" r="3"  fill="#C8823A"         opacity="0.5"/>
  <!-- Small sparks at anvil top -->
  <circle cx="236" cy="236" r="3"  fill="#ffcc66"         opacity="0.5"/>
  <circle cx="276" cy="234" r="2"  fill="#ffcc66"         opacity="0.4"/>
</svg>
